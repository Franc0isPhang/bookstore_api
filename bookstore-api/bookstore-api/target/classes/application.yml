spring:
  application:
    name: bookstore-api

  datasource:
    url: jdbc:h2:mem:bookstoredb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true  
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

server:
  port: 8080
  error:
    include-message: always


app:
  jwt:
    
    secret: ZGV2LXNlY3JldC1rZXktZm9yLWJvb2tzdG9yZS1hcGktcG9jLW9ubHktZG8tbm90LXVzZS1pbi1wcm9k
    expiration-ms: 3600000 

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
    com.bookstore: DEBUG
